<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel=stylesheet href="main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>vertical slider</title>
</head>
<body>
<div class="space-holder">
<!--first in right holder should place image last in left-->
<div class="left-holder">
    <div style="color:black; background-color:#FF8C00">
        <h1>Volcanoes</h1>
        <p>Mountains with burning hearts.</p> </div>
    <div style="color:seashell ; background-color:#8B0000">
        <h1>Flowers</h1>
        <p>Petals painting the wind.</p>
    </div>
    <div style="color:ghostwhite; background-color:#708090">
        <h1>Mountains</h1>
        <p>Granite reaching for glory.</p>
    </div>
    <div style="color:white;background-color:#00BFFF">
        <h1>Beach</h1>
        <p>Tides whispering to shore.</p>
    </div>
</div>
<div class="right-holder">
    <div style=" background-image:url('https://dynamic-media.tacdn.com/media/photo-o/31/08/cc/33/caption.jpg?f=webp&w=1000&h=700');"> </div>
     <div style="background-image:url('https://plus.unsplash.com/premium_photo-1666863909125-3a01f038e71f?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bW91bnRhaW4lMjBsYW5kc2NhcGV8ZW58MHx8MHx8fDA%3D');"> </div>
     <div style=" background-image:url('https://png.pngtree.com/background/20250106/original/pngtree-beautiful-close-up-photography-of-red-roses-in-high-definition-for-picture-image_15887998.jpg');"></div>
     <div style=" background-image:url('https://images.unsplash.com/photo-1619266465172-02a857c3556d?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8dm9sY2Fub3xlbnwwfHwwfHx8MA%3D%3D');"></div>
</div>

<div class="buttons">
    <button class="upper-button">
    <i class="fa-solid  fa-angle-up"></i> </button>
    <button class="down-button">
        <i class="fa-solid fa-angle-down"></i>
    </button>
</div>
</div>
<script src="index.js"></script>
</body>
</html>
